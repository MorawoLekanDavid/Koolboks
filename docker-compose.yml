services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: koolbuy-postgres
    environment:
      POSTGRES_DB: koolbuy
      POSTGRES_USER: koolbuy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-koolbuy_secure_password_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koolbuy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - koolbuy-network

  # Redis service for chat history and caching
  redis:
    image: redis:7-alpine
    container_name: koolbuy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - koolbuy-network

  # FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koolbuy-api
    ports:
      - "8001:8000"  # Host:Container - using 8001 to avoid local conflicts
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql://koolbuy:${DB_PASSWORD:-koolbuy_secure_password_2026}@postgres:5432/koolbuy
      - REDIS_URL=redis://redis:6379
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - CHAT_TTL=${CHAT_TTL:-3600}
      - MAX_HISTORY_MESSAGES=${MAX_HISTORY_MESSAGES:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./knowledge_base.txt:/app/knowledge_base.txt
      - ./system_prompt.txt:/app/system_prompt.txt
    networks:
      - koolbuy-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  koolbuy-network:
    driver: bridge
